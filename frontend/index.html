<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>DSA RAG Assistant</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>

<div class="app">

  <div class="chat-container">

    <div class="header">
      <h1>🤖 DSA Assistant</h1>
      <p>Your AI DSA Mentor</p>
    </div>

    <div id="chat" class="chat"></div>

    <div class="input-box">
      <input id="input" placeholder="Ask DSA question..." />
      <button onclick="sendMessage()">➤</button>
    </div>

  </div>

</div>

<script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
<script src="script.js"></script>
</body>
</html>
